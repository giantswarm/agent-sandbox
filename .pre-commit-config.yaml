# Managed in https://github.com/giantswarm/github/tree/main/repositories/override/agent-sandbox/.pre-commit-config.yaml
#
# Override of the devctl-generated config: the upstream chart files vendored
# via vendir under helm/agent-sandbox/charts/ lack trailing newlines and
# executable bits, and the auto-fixing/checking base hooks would flag them on
# every vendir bump (and vendir sync reverts any fix). Exclude the vendored
# subtree instead of hand-fixing per PR. Same pattern as agentgateway
# (giantswarm/github#5609) and kagent-app (giantswarm/github#5623).
# See https://github.com/giantswarm/agent-sandbox/pull/18
minimum_pre_commit_version: '2.17'
default_install_hook_types: [pre-commit, commit-msg]
repos:
  # base hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
        exclude: "^helm/agent-sandbox/charts/.*"
      - id: detect-private-key
      - id: end-of-file-fixer
        exclude: "(.*testdata/.*|^\\.yarn/.*|^helm/agent-sandbox/charts/.*)"
      - id: mixed-line-ending
        exclude: "^helm/agent-sandbox/charts/.*"
      - id: trailing-whitespace
        exclude: "(.*testdata/.*|^\\.yarn/.*|^helm/agent-sandbox/charts/.*)"

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--strict]

  # Helm chart hooks for agent-sandbox
  - repo: https://github.com/losisin/helm-values-schema-json
    rev: v2.5.0
    hooks:
      - id: helm-schema
        args:
          - --config
          - helm/agent-sandbox/.schema.yaml
  - repo: https://github.com/giantswarm/schemalint
    rev: v2.6.1
    hooks:
      - id: schemalint-normalize
        args:
          - helm/agent-sandbox/values.schema.json
          - -o
          - helm/agent-sandbox/values.schema.json
          - --force
      - id: schemalint-verify
        args:
          - helm/agent-sandbox/values.schema.json
  - repo: https://github.com/norwoodj/helm-docs
    rev: "v1.14.2"
    hooks:
      - id: helm-docs
        args:
          - --chart-search-root=helm
          - --sort-values-order=file
