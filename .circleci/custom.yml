# Repo-specific CircleCI jobs. The dynamic-config setup workflow in
# .circleci/config.yml deep-merges this file into the generated
# .circleci/workflows.yml at pipeline runtime (yq `*+`: maps merge, job lists
# append). devctl never touches this file.
#
# This repository ships a second chart, agent-sandbox-crds, alongside the
# generated agent-sandbox pipeline. The jobs below mirror the generated
# build/test/push shape for that chart, versioned in lockstep with agent-sandbox
# off the same git tag (.abs replace-chart-version-with-git). Same approach as
# giantswarm/muster publishing muster + muster-crds from one repo.
#
# explicit_allow_chart_name_mismatch is required because the chart name
# (agent-sandbox-crds) differs from the repo name (agent-sandbox); the orb's
# chart-name check otherwise refuses to publish a second chart from this repo.
version: 2.1

workflows:
  build:
    jobs:

    # build-crds-chart: package + lint the CRDs chart (no push). Branch + tag.
    - architect/push-to-app-catalog:
        executor: app-build-suite
        context: architect
        name: build-crds-chart
        app_catalog: giantswarm-catalog
        app_catalog_test: giantswarm-test-catalog
        chart: agent-sandbox-crds
        explicit_allow_chart_name_mismatch: true
        push_to_appcatalog: false
        push_to_oci_registry: false
        persist_chart_archive: true
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main

    # Tag: push the CRDs chart after it builds. Mirrors push-chart-release; does
    # NOT depend on sync-china-registry so the catalog publishes even if the
    # Aliyun mirror is slow or fails. No run-tests-with-ats gate: this repo has
    # no app-test-suite tests configured yet (tracked separately); add an
    # execute-crds-chart-tests job here once it does.
    - architect/push-to-app-catalog:
        executor: app-build-suite
        context: architect
        name: push-crds-chart-release
        app_catalog: giantswarm-catalog
        app_catalog_test: giantswarm-test-catalog
        chart: agent-sandbox-crds
        explicit_allow_chart_name_mismatch: true
        requires:
        - build-crds-chart
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/
