{{- if .Values.podSecurity.enabled }}
# The upstream agent-sandbox v0.4.6 chart does not expose pod/container
# securityContext via values, so we inject restricted-PSS fields into the
# controller Deployment at admission with a Kyverno mutate policy (same approach
# the agentic-platform umbrella uses for kagent). When upstream exposes
# securityContext via values (v0.5.0+), this can be replaced by plain subchart
# values and podSecurity.enabled set to false.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: {{ .Release.Name }}-controller-pod-security
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | quote }}
    application.giantswarm.io/team: bumblebee
  annotations:
    policies.kyverno.io/title: agent-sandbox controller pod security
    policies.kyverno.io/description: >-
      Adds restricted-PSS securityContext to the agent-sandbox-controller
      Deployment when absent, so it passes Pod Security Admission / Kyverno on
      Giant Swarm clusters.
spec:
  rules:
  - name: add-controller-security-context
    match:
      any:
      - resources:
          kinds:
          - apps/v1/Deployment
          names:
          - agent-sandbox-controller
          namespaces:
          - {{ .Values.podSecurity.namespace }}
    mutate:
      patchStrategicMerge:
        spec:
          template:
            spec:
              +(securityContext):
                {{- toYaml .Values.podSecurity.podSecurityContext | nindent 16 }}
              containers:
              - (name): agent-sandbox-controller
                +(securityContext):
                  {{- toYaml .Values.podSecurity.containerSecurityContext | nindent 18 }}
{{- end }}
