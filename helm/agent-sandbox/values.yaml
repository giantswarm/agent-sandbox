# Values for the vendored upstream agent-sandbox controller chart. The upstream
# chart is a subchart under charts/agent-sandbox (managed by vendir, pinned in
# vendir.lock.yml). Subchart values are namespaced under its chart name.
agent-sandbox:
  namespace:
    # create controls whether the namespace is created by this chart.
    create: true
    name: agent-sandbox-system
  image:
    # Giant Swarm-mirrored copy of registry.k8s.io/agent-sandbox/agent-sandbox-controller.
    repository: gsoci.azurecr.io/giantswarm/agent-sandbox-controller
    tag: v0.4.6
    pullPolicy: IfNotPresent
  replicaCount: 1
  controller:
    leaderElect: true
    # Install/reconcile the extension controllers (SandboxTemplate / SandboxClaim /
    # SandboxWarmPool). Their CRDs ship in agent-sandbox-crds regardless.
    extensions: false
    extraArgs: []
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Restricted-PSS hardening of the controller pod. The upstream v0.4.6 chart does
# not expose securityContext via values, so a Kyverno mutate policy injects it at
# admission (matches the umbrella's existing kagent pattern). Disable on clusters
# without Kyverno (and set securityContext another way).
podSecurity:
  enabled: true
  # Namespace of the controller Deployment to mutate. Must match
  # agent-sandbox.namespace.name above.
  namespace: agent-sandbox-system
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
