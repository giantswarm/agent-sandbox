# See https://docs.giantswarm.io/reference/platform-api/chart-metadata/
# for details and background.

apiVersion: v2

# Version of the packaged app (upstream agent-sandbox controller release).
appVersion: 0.4.6

# Make sure your name DOES NOT end in "app" or "-app".
name: agent-sandbox

# Please describe what the app provides in a sentence or two.
description: Giant Swarm packaging of the upstream kubernetes-sigs/agent-sandbox controller, which manages Sandbox resources (isolated, stateful, singleton pods) for AI agent runtimes on Kubernetes.

# URL of the GitHub repository that is the source of this Chart.yaml file.
home: https://github.com/giantswarm/agent-sandbox

# If you have an icon/logo, you should add it to https://github.com/giantswarm/web-assets
# and set the final URL here.
icon: https://s.giantswarm.io/app-icons/agent-sandbox/1/light.svg

sources:
- https://github.com/giantswarm/agent-sandbox
- https://github.com/kubernetes-sigs/agent-sandbox
version: 0.0.0-dev
annotations:
  # Adapt to 'giantswarm' if this application is not to be deployed by customers
  io.giantswarm.application.audience: all
  # Adapt to 'true' if Giant Swarm takes responsibility for this app where it's deplyed
  io.giantswarm.application.managed: "true"
  # used through .Chart.Annotations . Please replace TEAM-NAME with your team's short name, e. g. 'shield'  for team-shield
  io.giantswarm.application.team: bumblebee
dependencies:
  # Upstream kubernetes-sigs/agent-sandbox controller chart, vendored under
  # charts/ by vendir (the pinned ref is tracked in vendir.lock.yml).
  # CRDs are excluded from this subchart — they ship in agent-sandbox-crds.
  - name: agent-sandbox
    repository: file://charts/agent-sandbox
    version: 0.1.0
