apiVersion: vendir.k14s.io/v1alpha1
kind: Config
minimumRequiredVersion: 0.12.0
directories:
# Upstream agent-sandbox controller chart, vendored as a subchart of
# helm/agent-sandbox. CRDs are excluded here — they are vendored separately into
# the app chart's Helm 3 crds/ directory (see below) so the subchart installs no
# CRDs.
- path: helm/agent-sandbox/charts/agent-sandbox
  contents:
  - path: .
    git:
      url: https://github.com/kubernetes-sigs/agent-sandbox
      ref: v0.5.1
    includePaths:
    - helm/**/*
    excludePaths:
    - helm/crds/**
    newRootPath: helm
# CRDs (Sandbox + extensions) vendored into the app chart's Helm 3 crds/
# directory, so the agent-sandbox app chart owns its CRDs at the same version as
# the controller. vendir writes them PRISTINE; `make sync` then injects
# `helm.sh/resource-policy: keep` into each (committed), so the CRDs — and the
# CRs that depend on them — survive `helm uninstall`. Combined with Flux
# `crds: CreateReplace` on the HelmRelease, they upgrade atomically with the app.
- path: helm/agent-sandbox/crds
  contents:
  - path: .
    git:
      url: https://github.com/kubernetes-sigs/agent-sandbox
      ref: v0.5.1
    includePaths:
    - helm/crds/*
    newRootPath: helm/crds
